[[repos]]
repo = "local"
hooks = [
  {
    id = "nix-flake-check",
    name = "nix flake check",
    language = "system",
    entry = "nix flake check",
    pass_filenames = false,
    types = ["nix"],
  },
  {
    id = "nix-flake-update",
    name = "update flake.lock",
    language = "system",
    entry = "nix flake update",
    pass_filenames = false,
  },
  {
    id = "nixfmt",
    name = "nixfmt",
    language = "system",
    entry = "nixfmt",
    types = ["nix"],
  },
  {
    id = "statix",
    name = "statix",
    language = "system",
    entry = "statix check",
    pass_filenames = false,
    types = ["nix"],
  },
  {
    id = "deadnix",
    name = "deadnix",
    language = "system",
    entry = "deadnix --fail",
    types = ["nix"],
  },
  {
    id = "uv-sync",
    name = "uv sync",
    language = "system",
    entry = "uv sync",
    pass_filenames = false,
  },
  {
    id = "ruff-check",
    name = "ruff check",
    language = "system",
    entry = "ruff check --fix",
    types = ["python"],
  },
  {
    id = "ruff-format",
    name = "ruff format",
    language = "system",
    entry = "ruff format",
    types = ["python"],
  },
  {
    id = "ty-check",
    name = "ty check",
    language = "system",
    entry = "ty check",
    pass_filenames = false,
    types = ["python"],
  },
  {
    id = "check-test-naming",
    name = "check test naming",
    language = "system",
    entry = "python scripts/check_test_naming.py",
    pass_filenames = false,
  },
  {
    id = "pytest-unit",
    name = "pytest unit tests",
    language = "system",
    entry = "pytest -m unit_test",
    pass_filenames = false,
  },
]
